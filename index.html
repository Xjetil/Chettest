
<script>
  // === CONFIG ===
  const DEFAULTS = {
    URL_1: "https://t1-safezone.telenor.no/",
    URL_2: "https://t2-safezone.telenor.no/",
    TIMEOUT_MS: 1000 // 1 second timeout
  };

  const KEY = "statusLightConfig";
  function loadCfg() {
    try { const raw = localStorage.getItem(KEY); return raw ? JSON.parse(raw) : { ...DEFAULTS }; }
    catch { return { ...DEFAULTS }; }
  }
  function saveCfg(cfg) { localStorage.setItem(KEY, JSON.stringify(cfg)); }
  let cfg = loadCfg();
  const el = (id) => document.getElementById(id);

  function setLight(color, text) {
    el("light").className = `light ${color}`;
    el("statusText").textContent = text;
  }

  // fetch with timeout; resolves {ok, status, elapsedMs, timedOut}
  async function timedFetch(url, timeoutMs) {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort("timeout"), timeoutMs);
    const start = performance.now();
    try {
      const res = await fetch(url, { signal: ctrl.signal, cache: "no-store" });
      const elapsedMs = Math.round(performance.now() - start);
      clearTimeout(timer);
      return { ok: res.ok, status: res.status, elapsedMs, timedOut: false };
    } catch (err) {
      const elapsedMs = Math.round(performance.now() - start);
      clearTimeout(timer);
      const timedOut = (err && (err.name === "AbortError" || err === "timeout"));
      return {
        ok: false,
        status: timedOut ? "timeout" : (err?.message || "error"),
        elapsedMs,
        timedOut
      };
    }
  }

  function applyRule(a, b) {
    const a200 = a.ok && a.status === 200;
    const b200 = b.ok && b.status === 200;

    if (a200 && b200) return { color: "red", text: "Both services OK (200). Status: RED" };
    if (a200 && b.timedOut) return { color: "green", text: "URL1 OK (200), URL2 timed out. Status: GREEN" };
    if (!a200 && !b200) return { color: "grey", text: "No 200 OK within 1s. Status: GREY" };

    return { color: "grey", text: "Mixed/unspecified combination. Status: GREY" };
  }

  function updateDetail(prefix, url, result) {
    el(prefix).textContent = url;
    el(prefix.replace("url", "r")).textContent =
      result.ok ? "OK" : (result.timedOut ? "Timed out" : "Error");
    el(prefix.replace("url", "h")).textContent = result.status;
    el(prefix.replace("url", "t")).textContent = result.elapsedMs + " ms";
  }

  async function runCheck() {
    const { URL_1, URL_2, TIMEOUT_MS } = cfg;

    const [r1, r2] = await Promise.allSettled([
      timedFetch(URL_1, TIMEOUT_MS),
      timedFetch(URL_2, TIMEOUT_MS),
    ]);

    const a = r1.status === "fulfilled" ? r1.value : { ok: false, status: "error", elapsedMs: TIMEOUT_MS, timedOut: false };
    const b = r2.status === "fulfilled" ? r2.value : { ok: false, status: "error", elapsedMs: TIMEOUT_MS, timedOut: false };

    updateDetail("url1", URL_1, a);
    updateDetail("url2", URL_2, b);

    const rule = applyRule(a, b);
    setLight(rule.color, rule.text);

    el("lastRun").textContent = new Date().toLocaleString();
  }

  // Controls
  el("refreshBtn").addEventListener("click", runCheck);
  el("saveCfg").addEventListener("click", () => {
    cfg.URL_1 = el("cfg1").value.trim() || cfg.URL_1;
    cfg.URL_2 = el("cfg2").value.trim() || cfg.URL_2;
    const t = parseInt(el("cfgTimeout").value, 10);
    if (!Number.isNaN(t) && t >= 100) cfg.TIMEOUT_MS = t;
    saveCfg(cfg);
  });

  // Init UI
  el("cfg1").value = cfg.URL_1;
  el("cfg2").value = cfg.URL_2;
  el("cfgTimeout").value = cfg.TIMEOUT_MS;

  // No auto-refresh — only manual
</script>
